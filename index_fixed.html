<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밀실극장 파티 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;
  --gold-light:#e8c96a;
  --gold-dark:#8a6820;
  --parchment:#1a1408;
  --parchment-mid:#221b0a;
  --parchment-light:#2e2410;
  --ink:#d4b896;
  --ink-dim:#b89a6a;
  --ink-faint:#7a6a4a;
  --blood:#8b1a1a;
  --blood-light:#c0392b;
  --emerald:#1a4a2a;
  --emerald-light:#2ecc71;
  --steel:#2a3040;
  --board-bg:#3d2810;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Serif KR',serif;
  background-color:#4a2e12;
  background-image:
    repeating-linear-gradient(92deg,#00000018 0px,transparent 1px,transparent 55px,#00000010 55px,transparent 56px),
    repeating-linear-gradient(178deg,#00000014 0px,transparent 2px,transparent 90px,#c9a84c08 90px,transparent 92px),
    repeating-linear-gradient(4deg,transparent 0px,transparent 35px,#00000012 35px,transparent 36px),
    radial-gradient(ellipse at 10% 25%,#6b3d1850 0%,transparent 45%),
    radial-gradient(ellipse at 90% 75%,#2e180850 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,#3a220e30 0%,transparent 70%);
  color:var(--ink);
  min-height:100vh;
}

/* 배경 목재 질감 */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 3px,#ffffff04 3px,#ffffff04 4px,transparent 4px,transparent 8px),
    repeating-linear-gradient(180deg,transparent,transparent 60px,#00000018 60px,#00000018 62px);
  pointer-events:none;z-index:0;
}

/* ── 상단 길드 간판 ── */
.guild-header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,#2a1608 0%,#1e1005 100%);
  border-bottom:2px solid var(--gold-dark);
  padding:0 1.5rem;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px #000a;
}
.guild-header::before,.guild-header::after{
  content:'⚔';
  font-size:20px;
  color:var(--gold-dark);
  opacity:.6;
}
.guild-title{
  font-family:'Cinzel',serif;
  font-size:17px;font-weight:700;
  color:var(--gold);
  letter-spacing:2px;
  text-align:center;
  text-shadow:0 0 20px #c9a84c50;
  display:flex;align-items:center;gap:10px;
}
.guild-title .ornament{color:var(--gold-dark);font-size:13px}
.live-rune{
  width:8px;height:8px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 6px #4ade80;
  animation:runeGlow 2s infinite;
}
@keyframes runeGlow{0%,100%{opacity:1;box-shadow:0 0 6px #4ade80}50%{opacity:.3;box-shadow:0 0 2px #4ade80}}

.post-btn{
  background:linear-gradient(135deg,#8a6820,#c9a84c,#8a6820);
  color:#0d0a05;
  border:1px solid var(--gold);
  border-radius:4px;
  padding:8px 16px;
  font-size:13px;font-weight:700;
  cursor:pointer;
  font-family:'Cinzel',serif;
  letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
  transition:all .2s;
  box-shadow:0 2px 8px #c9a84c30,inset 0 1px 0 #e8c96a60;
}
.post-btn:hover{background:linear-gradient(135deg,#c9a84c,#e8c96a,#c9a84c);box-shadow:0 4px 16px #c9a84c50}

/* ── 페이지 ── */
.page{max-width:800px;margin:0 auto;padding:2rem 1rem 5rem;position:relative;z-index:1}

/* 장식 줄 */
.page-deco{
  text-align:center;
  color:var(--gold-dark);
  font-size:13px;
  letter-spacing:4px;
  margin-bottom:1.5rem;
  opacity:.7;
}

/* ── 등록 폼 (양피지 스크롤) ── */
.form-scroll{
  background:linear-gradient(180deg,#2a1c08,#221608,#2a1c08);
  border:1px solid var(--gold-dark);
  border-radius:4px;
  padding:1.5rem;
  margin-bottom:1.5rem;
  display:none;
  position:relative;
  box-shadow:0 8px 32px #000a,inset 0 0 60px #c9a84c08;
}
.form-scroll::before,.form-scroll::after{
  content:'';
  position:absolute;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--gold-dark),var(--gold),var(--gold-dark),transparent);
  opacity:.5;
}
.form-scroll::before{top:0}
.form-scroll::after{bottom:0}
.form-scroll.open{display:block}
.scroll-title{
  font-family:'Cinzel',serif;
  font-size:14px;font-weight:600;
  color:var(--gold);
  letter-spacing:1.5px;
  text-align:center;
  margin-bottom:1.25rem;
  padding-bottom:10px;
  border-bottom:1px solid var(--ink-faint);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;color:var(--gold-dark);font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:'Cinzel',serif}
.form-group input,.form-group textarea{
  border:1px solid var(--ink-faint);
  border-radius:3px;
  padding:8px 10px;
  font-size:14px;
  color:var(--ink);
  background:#150f05;
  font-family:'Noto Serif KR',serif;
  resize:none;
  transition:border-color .2s;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--gold-dark)}
.member-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.member-field{display:flex;align-items:center;gap:8px;border:1px solid var(--ink-faint);border-radius:3px;padding:7px 10px;background:#150f05}
.member-field:focus-within{border-color:var(--gold-dark)}
.gender-label{font-size:12px;color:var(--ink-dim);white-space:nowrap;font-family:'Cinzel',serif}
.member-field input{border:none;background:none;width:50px;font-size:14px;color:var(--ink);font-family:inherit}
.member-field input:focus{outline:none}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{
  border:1px solid var(--ink-faint);background:transparent;color:var(--ink-dim);
  border-radius:3px;padding:8px 14px;font-size:13px;cursor:pointer;
  font-family:'Cinzel',serif;letter-spacing:.5px;
}
.btn-cancel:hover{border-color:var(--ink-dim);color:var(--ink)}
.btn-post{
  background:linear-gradient(135deg,#6a4a10,#c9a84c,#6a4a10);
  color:#0d0a05;border:1px solid var(--gold-dark);
  border-radius:3px;padding:8px 18px;font-size:13px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;letter-spacing:.5px;
  box-shadow:inset 0 1px 0 #e8c96a50;
}
.btn-post:hover{background:linear-gradient(135deg,#c9a84c,#e8c96a,#c9a84c)}

/* ── 필터/정렬 ── */
.filter-row{display:flex;gap:8px;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap}
.filter-row span{font-size:11px;color:#b89a6a;font-family:'Cinzel',serif;letter-spacing:.5px}
.f-btn{
  font-size:11px;border:1px solid var(--ink-faint);border-radius:3px;
  padding:4px 12px;background:transparent;color:var(--ink-dim);cursor:pointer;
  font-family:'Cinzel',serif;letter-spacing:.3px;transition:all .2s;
}
.f-btn:hover{border-color:var(--gold-dark);color:var(--gold-dark)}
.f-btn.active{background:#2a1a04;border-color:var(--gold-dark);color:var(--gold)}

/* ── 섹션 헤더 ── */
.section-head{
  display:flex;align-items:center;gap:10px;
  margin:1.5rem 0 10px;
}
.section-head-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dark),transparent)}
.section-head-line.rev{background:linear-gradient(90deg,transparent,var(--gold-dark))}
.section-head-label{
  font-family:'Cinzel',serif;font-size:11px;font-weight:600;
  color:var(--gold-dark);letter-spacing:2px;white-space:nowrap;
}

/* ── 퀘스트 카드 (양피지 공고문) ── */
.quest-card{
  position:relative;
  background:linear-gradient(160deg,#241a08 0%,#1c1406 40%,#241a08 100%);
  border:1px solid #5a3e18;
  border-radius:3px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 2px 12px #0006;
}
.quest-card::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 28px,#c9a84c04 28px,#c9a84c04 29px);
  pointer-events:none;
}
.quest-card:hover{border-color:#5a4020;box-shadow:0 4px 20px #0008,0 0 0 1px #3a2a1030}
.quest-card.open-card{border-color:var(--gold-dark);box-shadow:0 6px 32px #0009,0 0 20px #c9a84c10}
.quest-card.past-card{
  background:linear-gradient(160deg,#1e1608,#18120604);
  border-color:#1e1a10;
  opacity:.6;
}
.quest-card.past-card:hover{opacity:.75;border-color:#2a2416}
.quest-card.full-card:not(.past-card){border-color:#5a3800}

/* 핀 장식 */
.card-pin{
  position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:14px;height:14px;
  background:radial-gradient(circle at 35% 35%,#8a8a8a,#3a3a3a);
  border-radius:50%;
  box-shadow:0 2px 4px #0008;
  z-index:2;
}
.past-card .card-pin{background:radial-gradient(circle at 35% 35%,#3a3a3a,#1a1a1a)}

/* 왼쪽 난이도 리본 */
.card-ribbon{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--gold-dark),var(--gold),var(--gold-dark));
}
.past-card .card-ribbon{background:linear-gradient(180deg,#2a2a2a,#3a3a3a,#2a2a2a)}
.full-card:not(.past-card) .card-ribbon{background:linear-gradient(180deg,#5a3800,#f59e0b,#5a3800)}

/* ── 카드 요약 행 (접힌 상태) ── */
.quest-summary{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px 14px 20px;
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
}

.quest-num{
  font-family:'Cinzel',serif;
  font-size:10px;color:#7a6a4a;
  letter-spacing:.5px;
  flex-shrink:0;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  min-width:14px;
}
.past-card .quest-num{color:#5a4a28}

.date-rune{
  flex-shrink:0;
  background:#120e04;
  border:1px solid #2e2010;
  border-radius:3px;
  padding:6px 10px;
  text-align:center;
  min-width:52px;
}
.rune-day{font-family:'Cinzel',serif;font-size:18px;font-weight:700;line-height:1;color:var(--gold)}
.rune-mon{font-size:10px;color:var(--gold-dark);margin-top:1px;letter-spacing:.5px}
.rune-dow{font-size:10px;color:#a08858;margin-top:1px}
.past-card .rune-day{color:#333}
.past-card .rune-mon{color:#5a4a28}
.past-card .rune-dow{color:#4a3a20}
.past-card .date-rune{border-color:#2e2210;background:#1a1408}

.quest-time{
  font-size:11px;color:var(--ink-dim);
  display:flex;align-items:center;gap:3px;
  white-space:nowrap;flex-shrink:0;
}
.past-card .quest-time{color:#5a4a30}

.quest-name{
  font-family:'Noto Serif KR',serif;
  font-size:15px;font-weight:600;
  color:var(--ink);
  flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .2s;
}
.quest-card:hover .quest-name{color:#e0c8a0}
.past-card .quest-name{color:#6a5a3a}

.quest-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* 상태 배지 */
.q-badge{
  font-family:'Cinzel',serif;
  font-size:10px;font-weight:600;
  letter-spacing:.5px;
  border-radius:2px;
  padding:3px 9px;
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.badge-active{background:#0d200d;color:#4ade80;border:1px solid #1a4a1a;box-shadow:0 0 8px #4ade8015}
.badge-full{background:#3d2000;color:#f59e0b;border:1px solid #6a3800;box-shadow:0 0 8px #f59e0b15}
.badge-ended{background:#2a2010;color:#7a6840;border:1px solid #3a3020}

.chevron-rune{
  color:var(--ink-faint);
  transition:transform .3s,color .2s;
  flex-shrink:0;
}
.open-card .chevron-rune{transform:rotate(180deg);color:var(--gold-dark)}
.past-card .chevron-rune{color:#5a4a28}

/* ── 펼쳐진 상세 ── */
.quest-detail{display:none;border-top:1px solid #2a1e08}
.open-card .quest-detail{display:block}

.detail-body{padding:16px 20px}

/* 퀘스트 설명 두루마리 */
.quest-note{
  background:#120e04;
  border:1px solid #2a1e08;
  border-left:3px solid var(--gold-dark);
  border-radius:0 3px 3px 0;
  padding:10px 14px;
  font-size:13px;color:var(--ink-dim);
  line-height:1.7;
  margin-bottom:14px;
  font-style:italic;
}
.quest-note::before{content:'📜 ';font-style:normal;font-size:12px}

/* 모집 슬롯 */
.slots-label{
  font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dark);
  letter-spacing:1.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.slots-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--ink-faint),transparent)}
.slot-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.slot-box{
  flex:1;min-width:130px;
  background:#0f0c04;
  border:1px solid #2a1e08;
  border-radius:3px;padding:12px;
  position:relative;overflow:hidden;
}
.slot-box.male-slot{border-top:2px solid #2563eb}
.slot-box.female-slot{border-top:2px solid #be185d}
.slot-box::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--ink-faint),transparent);
}

.slot-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.slot-label{font-family:'Cinzel',serif;font-size:12px;font-weight:600}
.slot-label.male{color:#60a5fa}
.slot-label.female{color:#f472b6}
.slot-count{font-size:11px;color:#c8a878}
.slot-count b{color:#e8d0a0}
.slot-full-badge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;background:#3d2000;color:#f59e0b;border:1px solid #5a3800;border-radius:2px;padding:2px 6px}

.slot-track{height:2px;background:#1a1408;border-radius:1px;margin-bottom:10px;overflow:hidden}
.slot-fill{height:100%;border-radius:1px;transition:width .4s}
.slot-fill.male{background:linear-gradient(90deg,#1d4ed8,#60a5fa)}
.slot-fill.female{background:linear-gradient(90deg,#9d174d,#f472b6)}
.slot-fill.maxed{background:linear-gradient(90deg,#92400e,#f59e0b)}

.party-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:24px}
.party-chip{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:2px;padding:3px 8px;font-size:11px;
  font-family:'Noto Serif KR',serif;
}
.party-chip.male{background:#0a1830;color:#93c5fd;border:1px solid #1e3060}
.party-chip.female{background:#25071a;color:#f9a8d4;border:1px solid #4a1035}
.chip-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.4;font-size:10px;padding:0;line-height:1}
.chip-x:hover{opacity:1}
.no-member{font-size:11px;color:#8a7050;font-style:italic}

.join-field{display:flex;gap:6px}
.join-input{
  flex:1;background:#0a0704;border:1px solid #2a1e08;border-radius:2px;
  padding:6px 10px;font-size:12px;color:var(--ink);
  font-family:'Noto Serif KR',serif;min-width:0;
  transition:border-color .2s;
}
.join-input:focus{outline:none;border-color:var(--gold-dark)}
.join-input.err{border-color:var(--blood-light)}
.join-btn-m,.join-btn-f{
  border:none;border-radius:2px;padding:6px 12px;font-size:11px;
  cursor:pointer;font-family:'Cinzel',serif;font-weight:600;
  letter-spacing:.3px;white-space:nowrap;transition:all .2s;
}
.join-btn-m{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:1px solid #3b82f6}
.join-btn-m:hover{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.join-btn-f{background:linear-gradient(135deg,#9d174d,#be185d);color:#fff;border:1px solid #db2777}
.join-btn-f:hover{background:linear-gradient(135deg,#be185d,#db2777)}
.ended-notice{
  font-family:'Cinzel',serif;font-size:11px;color:#8a7050;
  letter-spacing:1px;padding:6px 0;text-align:center;
  border:1px solid #2a1e08;border-radius:2px;background:#0f0c04;
}

/* 댓글 */
.tavern-talk{
  border-top:1px solid var(--ink-faint);
  padding-top:12px;margin-top:4px;
}
.talk-toggle{
  font-family:'Cinzel',serif;font-size:11px;color:var(--ink-faint);
  letter-spacing:.5px;cursor:pointer;background:none;border:none;
  display:flex;align-items:center;gap:6px;transition:color .2s;
  font-style:italic;
}
.talk-toggle:hover{color:var(--gold-dark)}
.talk-section{display:none;margin-top:12px}
.talk-section.open{display:block}
.talk-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.talk-item{display:flex;gap:8px}
.talk-avatar{
  width:28px;height:28px;border-radius:50%;
  background:#1a1408;border:1px solid var(--ink-faint);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:var(--gold-dark);flex-shrink:0;
}
.talk-body{flex:1}
.talk-meta{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.talk-name{font-size:12px;font-weight:600;color:var(--ink);font-family:'Cinzel',serif}
.talk-time{font-size:10px;color:#8a7050}
.talk-text{font-size:13px;color:#c0a878;line-height:1.6;word-break:break-all}
.del-talk{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:10px;font-family:inherit;padding:0;transition:color .2s}
.del-talk:hover{color:var(--blood-light)}
.talk-input{display:flex;gap:6px}
.talk-input input{
  flex:1;border:1px solid var(--ink-faint);border-radius:2px;
  padding:7px 10px;font-size:13px;color:var(--ink);
  background:#0f0c04;font-family:'Noto Serif KR',serif;
  transition:border-color .2s;
}
.talk-input input:focus{outline:none;border-color:var(--gold-dark)}
.talk-name-in{width:60px;flex:none}
.talk-send{
  background:linear-gradient(135deg,#4a3008,#8a6820);
  color:var(--gold-light);border:1px solid var(--gold-dark);
  border-radius:2px;padding:7px 13px;font-size:12px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:600;letter-spacing:.3px;
  white-space:nowrap;transition:all .2s;
}
.talk-send:hover{background:linear-gradient(135deg,#8a6820,#c9a84c)}

/* 수정/삭제 */
.card-footer{
  display:flex;justify-content:flex-end;gap:6px;
  padding:8px 16px 10px;
  border-top:1px solid #1e1608;
}
.f-act{
  background:none;border:1px solid #2a1e08;border-radius:2px;
  padding:4px 12px;font-size:11px;color:#a08858;
  cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.3px;
  display:flex;align-items:center;gap:4px;transition:all .2s;
}
.f-act:hover{border-color:var(--gold-dark);color:var(--gold-dark)}
.f-act.danger:hover{border-color:var(--blood);color:var(--blood-light)}

/* 빈 상태 */
.empty{
  text-align:center;padding:4rem 1rem;
  color:var(--ink-faint);font-size:14px;line-height:2.5;
  font-family:'Cinzel',serif;letter-spacing:1px;
}
.empty .empty-icon{font-size:36px;display:block;margin-bottom:.5rem;opacity:.3}
.loading{
  text-align:center;padding:3rem;
  color:var(--ink-faint);font-size:13px;
  font-family:'Cinzel',serif;letter-spacing:2px;
}

/* 토스트 */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#2a1a04,#3a2508);
  color:var(--gold);
  border:1px solid var(--gold-dark);
  padding:10px 22px;border-radius:3px;
  font-size:13px;font-family:'Cinzel',serif;letter-spacing:.5px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
  white-space:nowrap;box-shadow:0 4px 20px #000a;
}
.toast.show{opacity:1}

@media(max-width:520px){
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .slot-box{min-width:100%}
  .guild-title{font-size:13px;letter-spacing:1px}
}

/* ── 탭 네비 ── */
.tab-nav{
  background:#2a1608;
  border-bottom:1px solid var(--gold-dark);
  display:flex;gap:0;padding:0 1.5rem;
  position:sticky;top:64px;z-index:99;
}
.tab-btn{
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  letter-spacing:.8px;color:#b89a6a;
  background:none;border:none;border-bottom:2px solid transparent;
  padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:color .2s,border-color .2s;
}
.tab-btn:hover{color:var(--gold-dark)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── 기록부 페이지 ── */
#records-page{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;position:relative;z-index:1}
#records-page.active{display:block}
#board-page.hidden{display:none}

.rec-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.rec-search{
  flex:1;min-width:160px;
  background:#1a1008;border:1px solid var(--gold-dark);border-radius:3px;
  padding:8px 12px;font-size:13px;color:var(--ink);
  font-family:'Noto Serif KR',serif;
  transition:border-color .2s;
}
.rec-search::placeholder{color:#8a7050}
.rec-search:focus{outline:none;border-color:var(--gold)}
.rec-select{
  background:#1a1008;border:1px solid #3a2a10;border-radius:3px;
  padding:8px 10px;font-size:12px;color:#c0a070;
  font-family:'Cinzel',serif;letter-spacing:.3px;cursor:pointer;
}
.rec-select:focus{outline:none;border-color:var(--gold-dark)}

/* 통계 카드 */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.stat-box{
  background:#1a1008;border:1px solid #3a2a10;border-radius:4px;
  padding:12px 14px;text-align:center;
}
.stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold)}
.stat-label{font-size:11px;color:#a08858;letter-spacing:.5px;margin-top:3px}

/* 게임 카드 */
.game-card{
  background:linear-gradient(160deg,#241a08,#1c1406);
  border:1px solid #4a3010;border-radius:3px;
  margin-bottom:8px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
  position:relative;
}
.game-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 24px,#c9a84c03 24px,#c9a84c03 25px);pointer-events:none}
.game-card:hover{border-color:#7a5020;box-shadow:0 4px 20px #0007}
.game-card.open-rec{border-color:var(--gold-dark)}

.game-summary{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;cursor:pointer;user-select:none;
}
.rank-num{
  font-family:'Cinzel',serif;font-size:11px;color:#9a8060;
  min-width:24px;text-align:right;flex-shrink:0;
}
.rank-num.gold{color:#f59e0b;font-weight:700;font-size:13px}
.rank-num.silver{color:#aaa;font-weight:700;font-size:12px}
.rank-num.bronze{color:#cd7f32;font-weight:700;font-size:12px}

.score-ring{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  border:2px solid;position:relative;
}
.score-ring.s-great{border-color:#4ade80;color:#4ade80;background:#0d2a0d}
.score-ring.s-good{border-color:#86efac;color:#86efac;background:#0d200d}
.score-ring.s-mid{border-color:#f59e0b;color:#f59e0b;background:#2a1a00}
.score-ring.s-low{border-color:#f97316;color:#f97316;background:#2a0e00}
.score-ring.s-bad{border-color:#ef4444;color:#ef4444;background:#2a0000}

.game-meta-col{flex:1;min-width:0}
.game-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.game-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card:hover .game-title{color:#e0c8a0}
.diff-stars{font-size:11px;color:#c9a84c;white-space:nowrap;flex-shrink:0}
.game-info-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.g-info{font-size:11px;color:#b89a6a;display:flex;align-items:center;gap:3px}

.game-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.parti-count{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3px;
  background:#1a1408;border:1px solid #2e2010;border-radius:2px;
  padding:3px 8px;color:var(--ink-dim);white-space:nowrap;
}

/* 게임 상세 */
.game-detail{display:none;border-top:1px solid #2a1e08}
.open-rec .game-detail{display:block}
.game-detail-inner{padding:14px 16px}

.score-bar-section{margin-bottom:14px}
.sbar-label{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dark);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sbar-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--ink-faint),transparent)}
.score-bars{display:flex;flex-direction:column;gap:5px}
.sbar-row{display:flex;align-items:center;gap:8px}
.sbar-member{font-size:11px;color:#c0a070;min-width:34px;text-align:right;font-family:'Cinzel',serif}
.sbar-track{flex:1;height:6px;background:#1a1408;border-radius:3px;overflow:hidden;position:relative}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s ease;position:relative}
.sbar-fill.c-great{background:linear-gradient(90deg,#166534,#4ade80)}
.sbar-fill.c-good{background:linear-gradient(90deg,#14532d,#86efac)}
.sbar-fill.c-mid{background:linear-gradient(90deg,#78350f,#f59e0b)}
.sbar-fill.c-low{background:linear-gradient(90deg,#7c2d12,#f97316)}
.sbar-fill.c-bad{background:linear-gradient(90deg,#7f1d1d,#ef4444)}
.sbar-score{font-size:11px;font-family:'Cinzel',serif;min-width:28px;color:#c0a070}
.no-scores{font-size:12px;color:#8a7050;font-style:italic;padding:8px 0}

.absent-section{margin-top:10px;padding-top:10px;border-top:1px solid #1e1608}
.absent-label{font-size:10px;color:#9a8060;font-family:'Cinzel',serif;letter-spacing:.5px;margin-bottom:5px}
.absent-names{font-size:11px;color:#7a6a4a;line-height:1.7}

.owner-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:#2a1a04;border:1px solid #5a3800;border-radius:2px;
  padding:2px 8px;font-size:10px;color:var(--gold-dark);
  font-family:'Cinzel',serif;letter-spacing:.3px;
}


/* ── 기록 추가 폼 ── */
.rec-form-card{
  background:linear-gradient(180deg,#2a1c08,#221608,#2a1c08);
  border:1px solid var(--gold-dark);border-radius:4px;
  padding:1.25rem;margin-bottom:1.25rem;display:none;position:relative;
  box-shadow:0 8px 32px #000a,inset 0 0 60px #c9a84c08;
}
.rec-form-card::before,.rec-form-card::after{
  content:'';position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold-dark),var(--gold),var(--gold-dark),transparent);
  opacity:.5;
}
.rec-form-card::before{top:0}.rec-form-card::after{bottom:0}
.rec-form-card.open{display:block}

.score-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;margin-top:8px;
}
.score-cell{
  display:flex;align-items:center;gap:6px;
  background:#150f05;border:1px solid #2a1e08;border-radius:3px;
  padding:5px 8px;
}
.score-cell label{font-size:11px;color:#c0a070;flex:1;font-family:'Cinzel',serif}
.score-cell input{
  width:44px;background:none;border:none;border-bottom:1px solid #3a2a10;
  color:var(--ink);font-size:12px;font-family:'Noto Serif KR',serif;
  text-align:center;padding:2px 0;
}
.score-cell input:focus{outline:none;border-bottom-color:var(--gold-dark)}

.star-select{display:flex;gap:6px;margin-top:4px}
.star-btn{
  background:none;border:1px solid #2a1e08;border-radius:2px;
  padding:4px 10px;font-size:13px;cursor:pointer;color:var(--gold-dark);
  font-family:'Cinzel',serif;transition:all .2s;
}
.star-btn:hover,.star-btn.active{background:#2a1a04;border-color:var(--gold);color:var(--gold)}

.firebase-tag{
  display:inline-flex;align-items:center;gap:3px;
  background:#0d2510;border:1px solid #1a4a20;
  color:#4ade80;font-size:9px;font-family:'Cinzel',serif;
  letter-spacing:.3px;border-radius:2px;padding:1px 6px;
  flex-shrink:0;
}
.rec-add-btn{
  background:linear-gradient(135deg,#8a6820,#c9a84c,#8a6820);
  color:#0d0a05;border:1px solid var(--gold);border-radius:4px;
  padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Cinzel',serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 2px 8px #c9a84c30,inset 0 1px 0 #e8c96a60;
  transition:all .2s;
}
.rec-add-btn:hover{background:linear-gradient(135deg,#c9a84c,#e8c96a,#c9a84c)}
.rec-controls-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:10px;flex-wrap:wrap}


/* ── 탭 3 회원명부 ── */
#members-page{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;position:relative;z-index:1}
#members-page.active{display:block}

.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:1.5rem}
.member-card-btn{
  background:#1a1008;border:1px solid #3a2a10;border-radius:6px;
  padding:10px 8px;cursor:pointer;text-align:center;
  font-family:'Cinzel',serif;font-size:12px;color:#c0a070;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;
}
.member-card-btn:hover{border-color:var(--gold-dark);color:var(--gold);background:#241608}
.member-card-btn.active-member{border-color:var(--gold);background:#2a1c04;color:var(--gold)}
.member-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3a2010,#5a3820);
  border:1px solid #5a3820;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--gold);
}
.member-count{font-size:10px;color:#8a7050;letter-spacing:.3px}

.member-detail{display:none;background:#1a1008;border:1px solid #3a2a10;border-radius:6px;padding:1.25rem;margin-bottom:1rem}
.member-detail.open{display:block}
.member-detail-header{display:flex;align-items:center;gap:14px;margin-bottom:1rem;padding-bottom:10px;border-bottom:1px solid #2a1e08}
.member-avatar-lg{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#3a2010,#6a4020);
  border:2px solid var(--gold-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:var(--gold);
}
.member-stats{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap}
.mstat{text-align:center}
.mstat-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold)}
.mstat-label{font-size:10px;color:#8a7050;letter-spacing:.3px}
.member-games-list{display:flex;flex-direction:column;gap:6px}
.member-game-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 10px;background:#120e04;border:1px solid #241808;border-radius:4px;
}
.mg-score{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  min-width:36px;text-align:center;flex-shrink:0;
}
.mg-info{flex:1;min-width:0}
.mg-name{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mg-review{font-size:11px;color:#8a7050;line-height:1.5;font-style:italic}
.mg-empty{font-size:12px;color:#3a2a18;font-style:italic;text-align:center;padding:1rem}

/* ── 기록부 개편 ── */
.game-review-section{border-top:1px solid #1e1608;padding:12px 14px}
.review-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.review-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 10px;background:#120e04;border:1px solid #1e1608;border-radius:4px;
}
.rv-score{
  font-family:'Cinzel',serif;font-size:14px;font-weight:700;
  min-width:36px;text-align:center;flex-shrink:0;padding-top:1px;
}
.rv-body{flex:1;min-width:0}
.rv-header{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.rv-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--ink)}
.rv-time{font-size:10px;color:#5a4a28}
.rv-text{font-size:12px;color:#a08858;line-height:1.5;word-break:break-all}
.rv-del{background:none;border:none;cursor:pointer;color:#3a2a18;font-size:10px;font-family:inherit;padding:0;transition:color .2s;margin-left:auto;flex-shrink:0}
.rv-del:hover{color:var(--blood-light)}
.no-reviews{font-size:12px;color:#3a2418;font-style:italic;padding:6px 0;text-align:center}

.write-review-btn{
  background:linear-gradient(135deg,#4a3008,#7a5010);
  color:var(--gold-light);border:1px solid var(--gold-dark);
  border-radius:3px;padding:7px 14px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.5px;
  display:flex;align-items:center;gap:5px;transition:all .2s;margin-bottom:8px;
}
.write-review-btn:hover{background:linear-gradient(135deg,#7a5010,#c9a84c)}

.review-form{background:#0f0c04;border:1px solid #2a1e08;border-radius:4px;padding:10px 12px;display:none}
.review-form.open{display:block}
.review-form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end}
.rf-name{width:90px;flex:none}
.rf-score{width:70px;flex:none}
.rf-text{flex:1;min-width:120px}
.rf-input{
  background:#0a0704;border:1px solid #2a1e08;border-radius:3px;
  padding:7px 9px;font-size:13px;color:var(--ink);
  font-family:'Noto Serif KR',serif;width:100%;transition:border-color .2s;
}
.rf-input:focus{outline:none;border-color:var(--gold-dark)}
.rf-label{font-size:10px;color:#8a7050;font-family:'Cinzel',serif;letter-spacing:.3px;margin-bottom:3px;display:block}
.rf-submit{
  background:linear-gradient(135deg,#6a4a10,#c9a84c);
  color:#0d0a05;border:1px solid var(--gold-dark);border-radius:3px;
  padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Cinzel',serif;letter-spacing:.3px;white-space:nowrap;transition:all .2s;
}
.rf-submit:hover{background:linear-gradient(135deg,#c9a84c,#e8c96a)}

/* 자동완성 */
.autocomplete-wrap{position:relative}
.autocomplete-list{
  position:absolute;top:100%;left:0;right:0;z-index:200;
  background:#1e1608;border:1px solid var(--gold-dark);border-top:none;border-radius:0 0 4px 4px;
  max-height:200px;overflow-y:auto;display:none;
}
.autocomplete-list.open{display:block}
.ac-item{
  padding:8px 12px;font-size:13px;color:var(--ink);cursor:pointer;
  border-bottom:1px solid #2a1e08;transition:background .15s;
}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.selected{background:#2a1c08;color:var(--gold)}
.ac-match{color:var(--gold);font-weight:600}

/* ── 회원 명부 개편 ── */
.member-rank-badge{
  font-size:9px;font-family:'Cinzel',serif;letter-spacing:.5px;
  padding:2px 7px;border-radius:10px;border:1px solid;font-weight:600;
  display:inline-block;margin-top:2px;
}
.member-exp{font-size:10px;color:#8a7050;margin-top:1px}
.member-avg-val{font-size:11px;color:#c0a070;font-family:'Cinzel',serif}
.mstat-avg{font-family:'Cinzel',serif;font-size:14px;font-weight:700}

.member-game-row-score{
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.score-star{
  font-size:12px;font-family:'Cinzel',serif;font-weight:700;min-width:28px;text-align:center;
}
.mg-diff{font-size:10px;color:#6a5028}
.mg-date{font-size:10px;color:#5a4028}

/* 탭 내 서브메뉴 */
.members-sort-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.ms-btn{
  font-size:11px;border:1px solid #2e2010;border-radius:3px;
  padding:4px 10px;background:transparent;color:#8a7050;cursor:pointer;
  font-family:'Cinzel',serif;letter-spacing:.3px;transition:all .2s;
}
.ms-btn:hover{border-color:var(--gold-dark);color:var(--gold-dark)}
.ms-btn.active{background:#2a1a04;border-color:var(--gold-dark);color:var(--gold)}

.member-search-input{
  flex:1;min-width:120px;
  background:#1a1008;border:1px solid #3a2a10;border-radius:3px;
  padding:6px 10px;font-size:12px;color:var(--ink);
  font-family:'Noto Serif KR',serif;
}
.member-search-input::placeholder{color:#4a3820}
.member-search-input:focus{outline:none;border-color:var(--gold-dark)}


/* ── 레벨/역할 시스템 ── */
.member-level{
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:3px;
}
.lv-badge{
  font-family:'Cinzel',serif;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;border:1px solid;
  letter-spacing:.3px;
}
.lv-bar-wrap{width:100%;height:3px;background:#1e1608;border-radius:2px;overflow:hidden;margin-top:2px}
.lv-bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* 역할 색상 */
.role-master{color:#ef4444!important}
.role-detective{color:#7dd3fc!important}
.role-actor{color:#f9a8d4!important}
.role-genius{color:#1d4ed8!important}
.role-persona{color:#a855f7!important}
.role-badge{
  font-size:9px;font-family:'Cinzel',serif;font-weight:700;
  letter-spacing:.5px;padding:1px 7px;border-radius:10px;
  border:1px solid;display:inline-block;
}
.role-badge.role-master{border-color:#ef444440;background:#ef444415}
.role-badge.role-detective{border-color:#7dd3fc40;background:#7dd3fc15}
.role-badge.role-actor{border-color:#f9a8d440;background:#f9a8d415}
.role-badge.role-genius{border-color:#1d4ed840;background:#1d4ed815}
.role-badge.role-persona{border-color:#a855f740;background:#a855f715}

.role-select-panel{
  background:#0f0c04;border:1px solid #2a1e08;border-radius:4px;
  padding:10px 12px;margin-top:10px;display:none;
}
.role-select-panel.open{display:block}
.role-select-title{font-size:11px;font-family:'Cinzel',serif;color:#8a7050;margin-bottom:8px;letter-spacing:.5px}
.role-btns{display:flex;gap:6px;flex-wrap:wrap}
.role-assign-btn{
  font-size:11px;font-family:'Cinzel',serif;font-weight:700;
  border-radius:10px;border:1px solid;padding:3px 10px;cursor:pointer;
  background:transparent;letter-spacing:.3px;transition:all .2s;
}
.role-assign-btn:hover{opacity:.8}
.role-assign-btn.none-btn{color:#5a4a28;border-color:#2a1e08;background:transparent}

/* 스포일러 */
.rv-spoiler-wrap{position:relative;overflow:hidden}
.rv-spoiler-wrap.spoiler-unread{cursor:pointer}
.rv-spoiler-overlay{
  position:absolute;inset:0;
  background:#120e04cc;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;
  font-family:'Cinzel',serif;font-size:11px;color:#8a7050;
  letter-spacing:.5px;transition:opacity .2s;
}

function deepClone(value){
  if(value===undefined)return undefined;
  return JSON.parse(JSON.stringify(value));
}
function safeStoreGet(key){
  try{return window.localStorage.getItem(key);}catch(e){}
  return Object.prototype.hasOwnProperty.call(__memoryLocalStore,key)?__memoryLocalStore[key]:null;
}
function safeStoreSet(key,value){
  try{
    window.localStorage.setItem(key,value);
    return;
  }catch(e){}
  __memoryLocalStore[key]=value;
}
function safeSessionGet(key){
  try{return window.sessionStorage.getItem(key);}catch(e){return null;}
}
function safeSessionSet(key,value){
  try{window.sessionStorage.setItem(key,value);}catch(e){}
}
function createDocSnapshot(id,data){
  return {
    id:id,
    exists:data!==undefined,
    data:function(){return deepClone(data);}
  };
}
function createQuerySnapshot(store){
  var ids=Object.keys(store||{});
  var docs=ids.map(function(id){return createDocSnapshot(id,store[id]);});
  return {
    docs:docs,
    empty:docs.length===0,
    size:docs.length,
    forEach:function(cb){docs.forEach(cb);}
  };
}
function createLocalDb(prefix){
  function storageKey(name){return prefix+name;}
  function loadCollection(name){
    var raw=safeStoreGet(storageKey(name));
    if(!raw)return {};
    try{
      var parsed=JSON.parse(raw);
      return parsed&&typeof parsed==='object'?parsed:{};
    }catch(e){
      console.warn('local collection parse failed',name,e);
      return {};
    }
  }
  function saveCollection(name,data){
    safeStoreSet(storageKey(name),JSON.stringify(data||{}));
    notify(name);
  }
  function notify(name){
    var snap=createQuerySnapshot(loadCollection(name));
    (firestoreBindings[name]&&firestoreBindings[name].localListeners||[]).slice().forEach(function(fn){
      try{fn(snap);}catch(e){console.error(e);}
    });
  }
  function docRef(name,id){
    return {
      id:id,
      async get(){
        var store=loadCollection(name);
        return createDocSnapshot(id,store[id]);
      },
      async set(data,options){
        var store=loadCollection(name);
        var next=deepClone(data)||{};
        if(options&&options.merge&&store[id]){
          store[id]=Object.assign({},store[id],next);
        }else{
          store[id]=next;
        }
        saveCollection(name,store);
      },
      async update(patch){
        var store=loadCollection(name);
        if(!store[id])throw new Error('Document does not exist: '+name+'/'+id);
        store[id]=Object.assign({},store[id],deepClone(patch)||{});
        saveCollection(name,store);
      },
      async delete(){
        var store=loadCollection(name);
        if(Object.prototype.hasOwnProperty.call(store,id)){
          delete store[id];
          saveCollection(name,store);
        }
      }
    };
  }
  return {
    collection:function(name){
      return {
        async get(){
          return createQuerySnapshot(loadCollection(name));
        },
        onSnapshot:function(onNext,_onError){
          if(!firestoreBindings[name])firestoreBindings[name]={};
          firestoreBindings[name].localListeners=firestoreBindings[name].localListeners||[];
          firestoreBindings[name].localListeners.push(onNext);
          onNext(createQuerySnapshot(loadCollection(name)));
          return function(){
            var state=firestoreBindings[name];
            if(!state||!state.localListeners)return;
            state.localListeners=state.localListeners.filter(function(fn){return fn!==onNext;});
          };
        },
        async add(data){
          var store=loadCollection(name);
          var id=uid();
          store[id]=deepClone(data)||{};
          saveCollection(name,store);
          return {id:id};
        },
        doc:function(id){
          return docRef(name,id);
        }
      };
    },
    batch:function(){
      var ops=[];
      return {
        set:function(ref,data,options){
          ops.push(function(){return ref.set(data,options);});
        },
        commit:async function(){
          for(var i=0;i<ops.length;i++) await ops[i]();
        }
      };
    }
  };
}
function serverTimestampValue(){

function stampToMs(value){
  if(!value)return 0;
  if(typeof value==='number')return value;
  if(typeof value==='string'){
    var parsed=Date.parse(value);
    return isNaN(parsed)?0:parsed;
  }
  if(typeof value.toDate==='function'){
    try{return value.toDate().getTime();}catch(e){}
  }
  if(typeof value.seconds==='number'){
    return value.seconds*1000+Math.floor((value.nanoseconds||0)/1000000);
  }
  if(value instanceof Date)return value.getTime();
  return 0;
}
function stampToLabel(value){
  var ms=stampToMs(value);
  return ms?new Date(ms).toLocaleDateString('ko-KR'):'';
}

function clearFirestoreBinding(key){
  var state=firestoreBindings[key];
  if(!state)return;
  if(state.unsubscribe){
    try{state.unsubscribe();}catch(_e){}
    state.unsubscribe=null;
  }
  if(state.timer){
    clearInterval(state.timer);
    state.timer=null;
  }
}
function startPollingQuery(key,ref,onNext,onError,reason){
  var state=firestoreBindings[key]||{};
  if(state.mode==='poll')return state;
  clearFirestoreBinding(key);
  state=firestoreBindings[key]||{};
  state.mode='poll';
  state.reasonShown=!!state.reasonShown;
  firestoreBindings[key]=state;
  function fetchOnce(){
    ref.get().then(onNext).catch(function(err){
      if(onError)onError(err,true);
    });
  }
  fetchOnce();
  state.timer=window.setInterval(fetchOnce,FIRESTORE_POLL_MS);
  if(reason && !state.reasonShown){
    showToast(reason);
    state.reasonShown=true;
  }
  return state;
}
function bindQuery(key,ref,onNext,onError){
  clearFirestoreBinding(key);
  firestoreBindings[key]={mode:'live',timer:null,unsubscribe:null,reasonShown:false,localListeners:[]};
  if(USING_LOCAL_DB){
    firestoreBindings[key].mode='local';
    firestoreBindings[key].unsubscribe=ref.onSnapshot(onNext,function(err){
      if(onError)onError(err,false);
    });
    return firestoreBindings[key];
  }
  firestoreBindings[key].unsubscribe=ref.onSnapshot(onNext,function(err){
    var msg=String((err&&err.message)||err||'');
    if(/transport errored|webchannel|listen\/channel|write\/channel|(?:^|\D)400(?:\D|$)|network/i.test(msg)){
      startPollingQuery(key,ref,onNext,onError,'실시간 채널이 불안정하여 주기 동기화로 전환했습니다');
      return;
    }
    if(onError)onError(err,false);
  });
  return firestoreBindings[key];
}

async function submitEvent(){
  var date=document.getElementById('fDate').value;
  var time=document.getElementById('fTime').value;
  var title=document.getElementById('fTitle').value.trim();
  var male=parseInt(document.getElementById('fMale').value)||0;
  var female=parseInt(document.getElementById('fFemale').value)||0;
  var note=document.getElementById('fNote').value.trim();
  var eventPw=(document.getElementById('fEventPw').value||'').trim();

  if(!date||!title){alert('날짜와 작품명은 필수입니다.');return;}
  if(!editId && !validEventPassword(eventPw)){alert('공고 비밀번호 4자리를 입력해주세요.');return;}
  if(editId && eventPw && !validEventPassword(eventPw)){alert('공고 비밀번호는 4자리 숫자만 사용할 수 있습니다.');return;}

  var btn=document.getElementById('submitBtn');
  btn.textContent='게시 중...';
  btn.disabled=true;

  try{
    if(editId){
      var updateData={
        date:date,
        time:time,
        title:title,
        male:male,
        female:female,
        note:note,
        updatedAt:serverTimestampValue()
      };
      if(eventPw) updateData.authorPassword=eventPw;
      await col.doc(editId).update(updateData);
      showToast('✦ 공고가 수정되었습니다');
    }else{
      var ref=await col.add({
        date:date,
        time:time,
        title:title,
        male:male,
        female:female,
        note:note,
        authorPassword:eventPw,
        participants:[],
        comments:[],
        createdAt:serverTimestampValue()
      });
      openCards.add(ref.id);
      showToast('✦ 새 공고가 게시되었습니다');
    }
    closeForm();
  }catch(e){
    alert('저장 실패: '+e.message);
  }finally{
    btn.textContent='게시하기';
    btn.disabled=false;
  }
}

var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS=['\uc77c','\uc6d4','\ud654','\uc218','\ubaa9','\uae08','\ud1a0'];
function fmtDate(s){
  if(!s)return{day:'?',mon:'?',dow:'',full:''};
  var parts=s.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);
  var obj=new Date(y,m-1,d);
  return{day:d,mon:MONTHS[m-1],dow:DAYS[obj.getDay()],full:y+'\ub144 '+m+'\uc6d4 '+d+'\uc77c'};
}
function fmtTime(t){
  if(!t)return'';
  var hp=t.split(':');var hr=parseInt(hp[0]);
  return(hr<12?'\uc624\uc804':'\uc624\ud6c4')+' '+(hr===0?12:hr>12?hr-12:hr)+':'+hp[1];
}

// ══════ 모험 기록부 + 회원 명부 JS ══════
var GAMES = JSON.parse(document.getElementById('gamesData').textContent);
var LEGACY_MEMBER_STATS = JSON.parse(document.getElementById('memberStatsData').textContent);
var LEGACY_MEMBER_GAMES = {};
var STATIC_MEMBER_NAMES = JSON.parse(document.getElementById('membersListData').textContent);
var xlsxEl=document.getElementById('xlsxReviews');
var LEGACY_REVIEWS = xlsxEl ? JSON.parse(xlsxEl.textContent) : [];
var memberSortMode = 'exp';
var memberRoles = {};
var addedMembers = [];
var activeMemName = '';
var _rc=null,_ac={},_dc={};
var openRecs = new Set();
var firebaseGames = [];
var firebaseReviews = [];
var gamesCol = db.collection('games');
var reviewsCol = db.collection('reviews');
var memberRolesCol = db.collection('member_roles');
var membersCol = db.collection('members');
var recEditId = null;
var acIndex = -1;

function uniqueStrings(arr){
  var seen={};
  var out=[];
  (arr||[]).forEach(function(v){
    var s=String(v||'').trim();
    if(!s||seen[s])return;
    seen[s]=true;
    out.push(s);
  });
  return out;
}
function normalizeMemberName(name){
  return String(name||'').trim().replace(/\s+/g,' ');
}
function stripMemberAlias(name){
  return normalizeMemberName(name).replace(/\s*[\(（][^\)）]*[\)）]\s*$/,'').trim();
}
function getAllMemberNames(){
  return uniqueStrings((STATIC_MEMBER_NAMES||[]).concat(addedMembers||[])).sort(function(a,b){
    return a.localeCompare(b,'ko');
  });
}
function canonicalMemberName(name){
  var clean=normalizeMemberName(name);
  var stripped=stripMemberAlias(clean);
  var allMembers=getAllMemberNames();
  if(allMembers.indexOf(clean)>=0)return clean;
  if(allMembers.indexOf(stripped)>=0)return stripped;
  return clean;
}
function isRosterMember(name){
  return getAllMemberNames().indexOf(canonicalMemberName(name))>=0;
}
function starFromNumber(n){
  return n>0?['','★☆☆☆☆','★★☆☆☆','★★★☆☆','★★★★☆','★★★★★'][n]||'':'';
}
function starToNumber(str){
  return {'★☆☆☆☆':1,'★★☆☆☆':2,'★★★☆☆':3,'★★★★☆':4,'★★★★★':5}[String(str||'').trim()]||0;
}
function scoreNumber(v){
  if(v===null||v===undefined||v==='')return null;
  var n=parseFloat(v);
  return isNaN(n)?null:n;
}
function round1(n){
  return Math.round(n*10)/10;
}
function reviewKey(gameName,memberName){
  return String(gameName||'').trim()+'||'+canonicalMemberName(memberName);
}
function getMergedGames(){
  var map={};
  (GAMES||[]).forEach(function(g){
    if(!g||!g.name)return;
    map[g.name]=Object.assign({},g);
  });
  (firebaseGames||[]).forEach(function(g){
    if(!g||!g.name)return;
    var base=map[g.name]||{};
    map[g.name]=Object.assign({},base,g,{fromFirebase:true,id:g.id});
  });
  return Object.keys(map).map(function(name){return map[name];});
}
function getGameByName(name){
  var list=getMergedGames();
  for(var i=0;i<list.length;i++){
    if(list[i].name===name)return list[i];
  }
  return null;
}
function prepareReview(raw,isFirebase){
  raw=raw||{};
  var gameName=String(raw.gameName||'').trim();
  var memberName=canonicalMemberName(raw.memberName||'');
  var game=getGameByName(gameName);
  var score=scoreNumber(raw.score);
  var gameScore=null;

  if(game&&game.scores){
    gameScore=scoreNumber(game.scores[memberName]);
    if(gameScore===null){
      gameScore=scoreNumber(game.scores[stripMemberAlias(raw.memberName||'')]);
    }
  }

  if(score===null || (!isFirebase && score===0 && gameScore!==null && gameScore!==0)){
    score=gameScore;
  }

  var difficulty=parseInt(raw.difficulty,10);
  if(isNaN(difficulty)||difficulty<1||difficulty>5){
    difficulty=starToNumber(raw.diff||'');
  }
  if(!difficulty && game && game.diff){
    difficulty=starToNumber(game.diff);
  }

  var prepared=Object.assign({},raw,{
    gameName:gameName,
    memberName:memberName,
    review:String(raw.review||'').trim(),
    score:score,
    difficulty:difficulty||0,
    diff:difficulty?starFromNumber(difficulty):(raw.diff||((game&&game.diff)||'')),
    isSpoiler:!!raw.isSpoiler,
    fromFirebase:!!isFirebase,
    isStatic:!isFirebase
  });

  return prepared;
}
function invalidateReviewCache(){_rc=null;_ac={};_dc={};}
function getAllReviews(){
  if(_rc)return _rc;
  var legacy=(LEGACY_REVIEWS||[]).map(function(r){return prepareReview(r,false);});
  var live=(firebaseReviews||[]).map(function(r){return prepareReview(r,true);});
  var lk={};
  live.forEach(function(r){lk[reviewKey(r.gameName,r.memberName)]=true;});
  _rc=legacy.filter(function(r){return !lk[reviewKey(r.gameName,r.memberName)];}).concat(live);
  return _rc;
}
function getGameDiffNumber(n){
  if(_dc[n]!==undefined)return _dc[n];
  var rvs=getAllReviews().filter(function(r){return r.gameName===n&&parseInt(r.difficulty,10)>0;});
  var res;
  if(rvs.length){res=Math.max(1,Math.min(5,Math.round(rvs.reduce(function(s,r){return s+(parseInt(r.difficulty,10)||0);},0)/rvs.length)));}
  else{var g=getGameByName(n);res=(g&&g.diff)?starToNumber(g.diff):0;}
  _dc[n]=res;return res;
}
function getGameDiffString(gameName){
  return starFromNumber(getGameDiffNumber(gameName));
}
function getGameAvg(n){
  if(_ac[n]!==undefined)return _ac[n];
  var rvs=getAllReviews().filter(function(r){return r.gameName===n&&scoreNumber(r.score)!==null;});
  var res;
  if(rvs.length){res=round1(rvs.reduce(function(s,r){return s+scoreNumber(r.score);},0)/rvs.length);}
  else{
    var g=getGameByName(n);
    if(g&&g.scores){
      var sc=Object.keys(g.scores).map(function(m){return scoreNumber(g.scores[m]);}).filter(function(v){return v!==null;});
      if(sc.length)res=round1(sc.reduce(function(s,v){return s+v;},0)/sc.length);
    }
    if(res===undefined){var a=scoreNumber(g&&g.avg);res=a===null?0:round1(a);}
  }
  _ac[n]=res;return res;
}
function getMemberReviewEntries(member){
  var key=canonicalMemberName(member);
  return getAllReviews().filter(function(rv){
    return canonicalMemberName(rv.memberName)===key;
  });
}
function getMemberPlayedGames(member){
  var key=canonicalMemberName(member);
  var playedMap={};

  getMemberReviewEntries(key).forEach(function(rv){
    var sc=scoreNumber(rv.score);
    if(sc===null)return;
    playedMap[rv.gameName]={
      name:rv.gameName,
      score:sc,
      diff:rv.diff||getGameDiffString(rv.gameName),
      avg:getGameAvg(rv.gameName),
      review:rv.review||'',
      isReviewed:true,
      createdAt:rv.createdAt||null
    };
  });

  getMergedGames().forEach(function(g){
    if(!g||!g.name||playedMap[g.name])return;
    var sc=null;
    if(g.scores){
      sc=scoreNumber(g.scores[key]);
      if(sc===null){
        sc=scoreNumber(g.scores[stripMemberAlias(key)]);
      }
    }
    if(sc===null)return;
    playedMap[g.name]={
      name:g.name,
      score:sc,
      diff:getGameDiffString(g.name)||g.diff||'',
      avg:getGameAvg(g.name),
      review:'',
      isReviewed:false,
      createdAt:null
    };
  });

  (LEGACY_MEMBER_GAMES[key]||[]).forEach(function(g){
    if(!g||!g.name||playedMap[g.name])return;
    var sc=scoreNumber(g.score);
    if(sc===null)return;
    playedMap[g.name]={
      name:g.name,
      score:sc,
      diff:g.diff||getGameDiffString(g.name),
      avg:scoreNumber(g.avg),
      review:'',
      isReviewed:false,
      createdAt:null
    };
  });

  return Object.keys(playedMap).map(function(gameName){return playedMap[gameName];});
}
function getMemberStats(member){
  var reviewEntries=getMemberReviewEntries(member);
  var playedGames=getMemberPlayedGames(member);
  var playedScores=playedGames.map(function(g){return scoreNumber(g.score);}).filter(function(v){return v!==null;});
  var reviewScores=reviewEntries.map(function(rv){return scoreNumber(rv.score);}).filter(function(v){return v!==null;});
  return {
    exp: uniqueStrings(reviewEntries.map(function(rv){return rv.gameName;})).length,
    avg: playedScores.length?round1(playedScores.reduce(function(sum,v){return sum+v;},0)/playedScores.length):0,
    played: playedGames.length,
    reviewCount: reviewEntries.length,
    reviewAvg: reviewScores.length?round1(reviewScores.reduce(function(sum,v){return sum+v;},0)/reviewScores.length):0
  };
}

function normalizeMemberRoles(raw){
  var normalized={};
  if(!raw||typeof raw!=='object') return normalized;
  Object.keys(raw).forEach(function(member){
    var value=raw[member];
    if(Array.isArray(value)){
      var cleaned=value.filter(function(v){return typeof v==='string'&&v.trim();}).map(function(v){return v.trim();});
      if(cleaned.length) normalized[member]=cleaned;
    }else if(typeof value==='string'&&value.trim()){
      normalized[member]=[value.trim()];
    }
  });
  return normalized;
}

bindQuery('memberRoles',memberRolesCol,function(snap){

  snap.forEach(function(doc){
    var data=doc.data()||{};
    var member=canonicalMemberName(data.memberName||doc.id);
    var roles=[];
    if(Array.isArray(data.roles)){
      roles=data.roles;
    }else if(typeof data.role==='string'&&data.role.trim()){
      roles=[data.role.trim()];
    }
    roles=roles.filter(function(v){return typeof v==='string'&&v.trim();}).map(function(v){return v.trim();});
    if(member&&roles.length)nextRoles[member]=roles;
  });
  memberRoles=nextRoles;
  if((function(){var _el=document.getElementById('members-page');return _el&&_el.classList.contains('active');})() ){
    renderMemberGrid();
    renderMemberDetail();

});

async function migrateLegacyMemberRoles(){
  try{
    if(safeSessionGet('member_roles_migrated_v3')==='1') return;
    var legacyDoc=await db.collection('config').doc('memberRoles').get();
    if(!legacyDoc.exists){
      safeSessionSet('member_roles_migrated_v3','1');
      return;
    }
    var legacyRoles=normalizeMemberRoles((legacyDoc.data()||{}).roles||{});
    var members=Object.keys(legacyRoles);
    if(!members.length){
      safeSessionSet('member_roles_migrated_v3','1');
      return;
    }
    var batch=db.batch();
    members.forEach(function(member){
      batch.set(memberRolesCol.doc(member),{
        memberName:member,
        roles:legacyRoles[member],
        migratedAt:serverTimestampValue()
      },{merge:true});
    });
    await batch.commit();
    safeSessionSet('member_roles_migrated_v3','1');
  }catch(e){
    console.error('legacy member role migration failed',e);
  }
}

function acSearch(val){
  var list=document.getElementById('acList');
  if(!val||val.length<1){list.classList.remove('open');return;}
  var q=val.toLowerCase().replace(/\s/g,'');
  var all=getMergedGames().map(function(g){return g.name;});
  var matches=all.filter(function(n){
    return n.toLowerCase().replace(/\s/g,'').indexOf(q)>=0;
  }).slice(0,8);
  if(!matches.length){list.classList.remove('open');return;}
  list.innerHTML=matches.map(function(n,i){
    var hi=n.replace(new RegExp('('+val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="ac-match">$1</span>');
    return '<div class="ac-item" onmousedown="acSelect(\''+n.replace(/'/g,"\\'")+'\')" data-idx="'+i+'">'+hi+'</div>';
  }).join('');
  acIndex=-1;
  list.classList.add('open');
}
function acSelect(name){
  document.getElementById('rfName').value=name;
  document.getElementById('acList').classList.remove('open');
  var g=getGameByName(name);
  if(g){
    if(g.owner)document.getElementById('rfOwner').value=g.owner;
    if(g.players)document.getElementById('rfPlayers').value=g.players;
  }
}
function acKeydown(e){
  var items=document.querySelectorAll('#acList .ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){acIndex=Math.min(acIndex+1,items.length-1);}
  else if(e.key==='ArrowUp'){acIndex=Math.max(acIndex-1,-1);}
  else if(e.key==='Enter'){
    if(acIndex>=0){acSelect(items[acIndex].textContent);e.preventDefault();}
    return;
  }else if(e.key==='Escape'){
    document.getElementById('acList').classList.remove('open');
    return;
  }
  items.forEach(function(el,i){el.classList.toggle('selected',i===acIndex);});
}

}

function filterGames(){
  var q=(document.getElementById('recSearch').value||'').trim().toLowerCase();
  var sort=document.getElementById('recSort').value;
  var diff=document.getElementById('recDiff').value;
  var score=document.getElementById('recScore').value;
  var players=document.getElementById('recPlayers').value;
  var list=getMergedGames().slice();

  if(q)list=list.filter(function(g){return g.name.toLowerCase().indexOf(q)>=0;});
  if(diff)list=list.filter(function(g){return getGameDiffString(g.name)===diff;});
  if(score==='9')list=list.filter(function(g){return getGameAvg(g.name)>=9;});
  else if(score==='8')list=list.filter(function(g){return getGameAvg(g.name)>=8;});
  else if(score==='7')list=list.filter(function(g){return getGameAvg(g.name)>=7;});
  else if(score==='5-')list=list.filter(function(g){return getGameAvg(g.name)<5&&getGameAvg(g.name)>0;});
  if(players){
    list=list.filter(function(g){
      var n=parseInt((g.players||'0').match(/\d+/)||['0'],10);
      return players==='9+'?n>=9:n===parseInt(players,10);
    });
  }

  if(sort==='avg-desc')list.sort(function(a,b){return getGameAvg(b.name)-getGameAvg(a.name);});
  else if(sort==='avg-asc')list.sort(function(a,b){return getGameAvg(a.name)-getGameAvg(b.name);});
  else if(sort==='name')list.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  else if(sort==='diff-desc')list.sort(function(a,b){return getGameDiffNumber(b.name)-getGameDiffNumber(a.name);});
  else if(sort==='review-desc')list.sort(function(a,b){
    return getAllReviews().filter(function(r){return r.gameName===b.name;}).length-getAllReviews().filter(function(r){return r.gameName===a.name;}).length;
  });

  renderGames(list);
}

    return;

  var score=scoreNumber(document.getElementById('rvs_'+rank).value);

  if(diffNum<1||diffNum>5){alert('난이도를 선택해주세요.');return;}

  var existing=getAllReviews().find(function(rv){
    return reviewKey(rv.gameName,rv.memberName)===reviewKey(gameName,name);
  });
  var existedBefore=!!existing;
  var payload={
    gameName:gameName,
    memberName:name,
    score:score,
    difficulty:diffNum,
    diff:starFromNumber(diffNum),
    review:review,
    isSpoiler:isSpoiler,
    updatedAt:serverTimestampValue()
  };

  try{
    if(existing&&existing.fromFirebase&&existing.id){
      await reviewsCol.doc(existing.id).update(payload);
    }else{
      payload.createdAt=serverTimestampValue();
      await reviewsCol.add(payload);
    }

    document.getElementById('rvn_'+rank).value='';
    document.getElementById('rvs_'+rank).value='';
    document.getElementById('rvd_'+rank).value='';
    document.getElementById('rvt_'+rank).value='';
    if(spEl)spEl.checked=false;
    var f=document.getElementById('rvf_'+rank);
    if(f)f.classList.remove('open');

    var toastMsg='✦ '+name+' 님의 리뷰가 등록되었습니다';
    if(isRosterMember(name)&&!existedBefore)toastMsg+=' · EXP +1';
    else if(isRosterMember(name)&&existedBefore)toastMsg+=' · 기존 작품 리뷰로 EXP 유지';
    else toastMsg+=' · 명부 미등록';
    showToast(toastMsg);
  }catch(err){
    alert('리뷰 저장 실패: '+err.message);
  }
}
async function deleteReview(id,e){
  if(e)e.stopPropagation();
  if(!confirm('리뷰를 삭제하시겠습니까?'))return;
  await reviewsCol.doc(id).delete();
  showToast('리뷰가 삭제되었습니다');
}

function getLevel(exp){ return Math.floor((exp||0)/5); }
function getLvColor(lv){
  if(lv>=14)return'#f59e0b';
  if(lv>=10)return'#c9a84c';
  if(lv>=7)return'#86efac';
  if(lv>=4)return'#93c5fd';
  if(lv>=2)return'#aaa';
  return'#4a3820';
}
function getRoleClass(roleOrArr){
  var role=Array.isArray(roleOrArr)?(roleOrArr[0]||''):roleOrArr;
  if(role==='마스터플레이어')return'role-master';
  if(role==='수사관')return'role-detective';
  if(role==='연기자')return'role-actor';
  if(role==='명탐정')return'role-genius';
  if(role==='페르소나')return'role-persona';
  return'';
}
function getRoleColor(roleOrArr){
  var role=Array.isArray(roleOrArr)?(roleOrArr[0]||''):roleOrArr;
  if(role==='마스터플레이어')return'#ef4444';
  if(role==='수사관')return'#7dd3fc';
  if(role==='연기자')return'#f9a8d4';
  if(role==='명탐정')return'#1d4ed8';
  if(role==='페르소나')return'#a855f7';
  return'';
}
function getRoleBadgesHTML(roleOrArr){
  var roles=Array.isArray(roleOrArr)?roleOrArr:(roleOrArr?[roleOrArr]:[]);
  if(!roles.length)return'';
  return roles.map(function(r){
    return '<span class="role-badge '+getRoleClass(r)+'" style="margin-right:3px">'+r+'</span>';
  }).join('');
}

var isAdminUnlocked=false;
var ADMIN_PW='4521';
var pwContext={mode:'admin',eventId:'',onSuccess:null};

function openPwModal(options){
  options=options||{};
  pwContext={
    mode:options.mode||'admin',
    eventId:options.eventId||'',
    onSuccess:typeof options.onSuccess==='function'?options.onSuccess:null
  };
  document.getElementById('pwTitle').textContent=options.title||(pwContext.mode==='event'?'✦ 작성자 비밀번호 ✦':'✦ 관리자 인증 ✦');
  document.getElementById('pwInput').value='';
  document.getElementById('pwError').textContent='';
  document.getElementById('pwModalWrap').classList.remove('hidden');
  setTimeout(function(){document.getElementById('pwInput').focus();},100);
}
function closePwModal(){
  document.getElementById('pwModalWrap').classList.add('hidden');
  pwContext={mode:'admin',eventId:'',onSuccess:null};
}
function pwKeyInput(el){
  if(el.value.length===4)confirmPw();
}
function confirmPw(){
  var val=(document.getElementById('pwInput').value||'').trim();
  if(!/^\d{4}$/.test(val)){
    document.getElementById('pwError').textContent='4자리 숫자를 입력해주세요';
    return;
  }

  if(pwContext.mode==='admin'){
    if(val===ADMIN_PW){
      var cb=pwContext.onSuccess;
      isAdminUnlocked=true;
      closePwModal();
      showToast('✦ 관리자 모드 활성화');
      if(cb)cb();
    }else{
      document.getElementById('pwError').textContent='비밀번호가 틀렸습니다';
      document.getElementById('pwInput').value='';
    }
    return;
  }

  if(pwContext.mode==='event'){
    var ev=events.find(function(x){return x.id===pwContext.eventId;});
    if(ev&&String(ev.authorPassword||'')===val){
      var done=pwContext.onSuccess;
      closePwModal();
      if(done)done();
    }else{
      document.getElementById('pwError').textContent='작성자 비밀번호가 틀렸습니다';
      document.getElementById('pwInput').value='';
    }
  }
}
function requireAdmin(onSuccess){
  if(isAdminUnlocked){
    if(typeof onSuccess==='function')onSuccess();
    return true;
  }
  openPwModal({mode:'admin',onSuccess:onSuccess});
  return false;
}
function verifyEventOwner(id,onSuccess){
  var ev=events.find(function(x){return x.id===id;});
  if(!ev)return false;
  if(isAdminUnlocked){
    if(typeof onSuccess==='function')onSuccess();
    return true;
  }
  if(!ev.authorPassword){
    showToast('이 공고는 관리자만 수정·삭제할 수 있습니다');
    return false;
  }
  openPwModal({mode:'event',eventId:id,onSuccess:onSuccess});
  return false;
}

function getRoles(member){
  var key=canonicalMemberName(member);
  var roles=memberRoles[key];
  if(!roles)return [];
  return Array.isArray(roles)?roles.filter(function(v){return typeof v==='string'&&v.trim();}).map(function(v){return v.trim();}):[];
}
function getPrimaryRole(member){
  var roles=getRoles(member);
  return roles.length?roles[0]:'';
}
function openRolePanel(member){
  var panel=document.getElementById('rp_'+member);
  if(panel)panel.classList.add('open');
}
async function assignRole(member,role){
  member=canonicalMemberName(member);
  if(!isAdminUnlocked){
    requireAdmin(function(){assignRole(member,role);});
    return;
  }
  if(!member)return;
  var ref=memberRolesCol.doc(member);
  if(!role){
    await ref.delete().catch(function(){});
    showToast(member+' 역할 해제');
    return;
  }
  await ref.set({
    memberName:member,
    roles:[role],
    updatedAt:serverTimestampValue()
  },{merge:true});
  showToast(member+' → '+role);
}
function toggleRolePanel(member){
  member=canonicalMemberName(member);
  if(!isAdminUnlocked){
    requireAdmin(function(){toggleRolePanel(member);});
    return;
  }
  var panel=document.getElementById('rp_'+member);
  if(panel)panel.classList.toggle('open');
}
async function toggleRole(member,role){
  member=canonicalMemberName(member);
  if(!isAdminUnlocked){
    requireAdmin(function(){toggleRole(member,role);});
    return;
  }
  if(!member||!role)return;
  var ref=memberRolesCol.doc(member);
  var currentRoles=getRoles(member);
  var nextRoles=currentRoles.indexOf(role)>=0
    ?currentRoles.filter(function(r){return r!==role;})
    :currentRoles.concat([role]);

  if(!nextRoles.length){
    await ref.delete().catch(function(){});
    showToast(member+' 역할 해제');
    return;
  }

  await ref.set({
    memberName:member,
    roles:nextRoles,
    updatedAt:serverTimestampValue()
  },{merge:true});
  showToast(member+' → '+nextRoles.join(', '));
}
async function clearAllRoles(member){
  member=canonicalMemberName(member);
  if(!isAdminUnlocked){
    requireAdmin(function(){clearAllRoles(member);});
    return;
  }
  if(!member)return;
  await memberRolesCol.doc(member).delete().catch(function(){});
  showToast(member+' 모든 역할 해제');
}

function toggleMemberAdminPanel(){
  if(!isAdminUnlocked){
    requireAdmin(function(){toggleMemberAdminPanel();});
    return;
  }
  var panel=document.getElementById('memberAdminPanel');
  if(!panel)return;
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    var input=document.getElementById('newMemberName');
    if(input)input.focus();
  }
}
async function addMember(){
  if(!isAdminUnlocked){
    requireAdmin(function(){addMember();});
    return;
  }
  var input=document.getElementById('newMemberName');
  if(!input)return;
  var name=normalizeMemberName(input.value);
  if(!name){alert('회원 이름을 입력해주세요.');return;}
  if(getAllMemberNames().indexOf(name)>=0){
    showToast('이미 등록된 회원입니다');
    return;
  }
  try{
    await membersCol.doc(name).set({
      memberName:name,
      createdAt:serverTimestampValue()
    },{merge:true});
    input.value='';
    showToast('✦ '+name+' 회원이 추가되었습니다');
  }catch(e){
    alert('회원 추가 실패: '+e.message);
  }
}

function setMemberSort(mode){
  memberSortMode=mode;
  ['exp','avg','name'].forEach(function(m){
    var el=document.getElementById('msort-'+m);
    if(el)el.className='ms-btn'+(m===mode?' active':'');
  });
  renderMemberGrid();
}
function renderMemberGrid(){
  var q=(document.getElementById('memberSearch').value||'').trim();
  var grid=document.getElementById('memberGrid');
  var list=getAllMemberNames();
  var statsCache={};
  // 렌더링 전 모든 stats 일괄 계산 (getAllReviews 1회 → 캐시 활용)
  getAllMemberNames().forEach(function(name){statsCache[name]=getMemberStats(name);});
  function getStatsCached(name){return statsCache[name]||{exp:0,avg:0,played:0,reviewCount:0,reviewAvg:0};}

  if(q)list=list.filter(function(m){return m.indexOf(q)>=0;});
  if(memberSortMode==='exp')list.sort(function(a,b){return getStatsCached(b).exp-getStatsCached(a).exp;});
  else if(memberSortMode==='avg')list.sort(function(a,b){return getStatsCached(b).avg-getStatsCached(a).avg;});
  else list.sort(function(a,b){return a.localeCompare(b,'ko');});

  grid.innerHTML=list.map(function(m){
    var s=getStatsCached(m);
    var lv=getLevel(s.exp);
    var lvColor=getLvColor(lv);
    var nextLvExp=(lv+1)*5;
    var curLvExp=lv*5;
    var pct=s.exp>0?Math.min(100,Math.round((s.exp-curLvExp)/(nextLvExp-curLvExp)*100)):0;
    var roles=getRoles(m);
    var primaryRole=roles[0]||'';
    var roleColor=getRoleColor(primaryRole);
    var isActive=m===activeMemName;
    return '<button class="member-card-btn'+(isActive?' active-member':'')+'" data-mname="'+m+'">'
      +'<div class="member-avatar" style="'+(roleColor?'border-color:'+roleColor+'60;background:linear-gradient(135deg,'+roleColor+'20,'+roleColor+'10)':'')+'">'+m.slice(0,1)+'</div>'
      +'<span style="font-size:12px;font-weight:600;'+(roleColor?'color:'+roleColor:'')+'">'+m+'</span>'
      +getRoleBadgesHTML(roles)
      +'<div style="display:flex;align-items:center;gap:4px;margin-top:1px">'
      +'<span class="lv-badge" style="color:'+lvColor+';border-color:'+lvColor+'40;background:'+lvColor+'15">Lv.'+lv+'</span>'
      +'<span style="font-size:9px;color:#6a5028">EXP '+s.exp+'</span>'
      +'</div>'
      +'<div class="lv-bar-wrap"><div class="lv-bar-fill" style="width:'+pct+'%;background:'+lvColor+'"></div></div>'
      +(s.avg>0?'<span class="member-avg-val">avg '+s.avg.toFixed(1)+'</span>':'')
      +(s.reviewCount>0?'<span class="member-count">리뷰 '+s.reviewCount+'개</span>':(s.played>0?'<span class="member-count">플레이 '+s.played+'회</span>':''))
      +'</button>';
  }).join('');
}
function showMember(name){
  activeMemName=canonicalMemberName(name);
  renderMemberGrid();
  renderMemberDetail();
}
function renderMemberDetail(){
  var det=document.getElementById('memberDetail');
  if(!activeMemName){det.classList.remove('open');return;}
  var m=canonicalMemberName(activeMemName);
  if(getAllMemberNames().indexOf(m)<0){det.classList.remove('open');return;}

  var s=getMemberStats(m);
  var lv=getLevel(s.exp);
  var lvColor=getLvColor(lv);
  var nextLvExp=(lv+1)*5;
  var curLvExp=lv*5;
  var pct=s.exp>0?Math.min(100,Math.round((s.exp-curLvExp)/(nextLvExp-curLvExp)*100)):0;
  var roles=getRoles(m);
  var primaryRole=roles[0]||'';
  var roleColor=getRoleColor(primaryRole);
  var rvs=getMemberReviewEntries(m).slice().sort(function(a,b){
    var aTime=stampToMs(a.createdAt);
    var bTime=stampToMs(b.createdAt);
    if(bTime!==aTime)return bTime-aTime;
    return (scoreNumber(b.score)||0)-(scoreNumber(a.score)||0);
  });
  var playedGames=getMemberPlayedGames(m).slice().sort(function(a,b){
    return (scoreNumber(b.score)||0)-(scoreNumber(a.score)||0);
  });

  var ROLES=['마스터플레이어','수사관','연기자','명탐정','페르소나'];
  var roleBtns=ROLES.map(function(r){
    var rClass=getRoleClass(r);
    var rColor=getRoleColor(r);
    var isCur=roles.indexOf(r)>=0;
    var bg=isCur?rColor+'20':'transparent';
    return '<button class="role-assign-btn" data-assign-member="'+m+'" data-assign-role="'+r+'" style="color:'+rColor+';border-color:'+rColor+'50;background:'+bg+'">'+(isCur?'✓ ':'')+r+'</button>';
  }).join('');

  var rvHTML=rvs.length===0
    ?'<div class="mg-empty">아직 작성한 리뷰가 없습니다.</div>'
    :rvs.map(function(rv){
        var sc=scoreNumber(rv.score);
        var scColor=sc!==null?(sc>=9?'#4ade80':sc>=8?'#86efac':sc>=7?'#f59e0b':sc>=5?'#f97316':'#ef4444'):'#8a7050';
        return '<div class="member-game-row">'
          +'<div class="mg-score" style="color:'+scColor+'">'+(sc!==null?sc.toFixed(1):'-')+'</div>'
          +'<div class="mg-info"><div class="mg-name">'+escR(rv.gameName)+'</div>'
          +(rv.diff?'<div class="mg-diff">난이도 '+escR(rv.diff)+'</div>':'')
          +(rv.review?'<div class="mg-review">'+escR(rv.review)+'</div>':'')
          +'</div>'
          +(rv.createdAt?'<div class="mg-date">'+stampToLabel(rv.createdAt)+'</div>':'')
          +'</div>';
      }).join('');

  var csvHTML=playedGames.length===0
    ?'<div class="mg-empty">플레이 기록이 없습니다.</div>'
    :playedGames.map(function(g){
        var sc=scoreNumber(g.score);
        var scColor=sc!==null?(sc>=9?'#4ade80':sc>=8?'#86efac':sc>=7?'#f59e0b':sc>=5?'#f97316':'#ef4444'):'#8a7050';
        return '<div class="member-game-row">'
          +'<div class="mg-score" style="color:'+scColor+'">'+(sc!==null?sc.toFixed(1):'-')+'</div>'
          +'<div class="mg-info"><div class="mg-name">'+escR(g.name)+'</div>'+(g.diff?'<div class="mg-diff">'+escR(g.diff)+'</div>':'')+'</div>'
          +'</div>';
      }).join('');

  det.innerHTML=
    '<div class="member-detail-header">'
    +'<div class="member-avatar-lg" style="'+(roleColor?'border-color:'+roleColor+';background:linear-gradient(135deg,'+roleColor+'30,'+roleColor+'10)':'')+'">'+m.slice(0,1)+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-family:Cinzel,serif;font-size:18px;font-weight:700;'+(roleColor?'color:'+roleColor:'color:var(--gold)')+'">'+m+'</div>'
    +(roles.length?'<div style="margin-top:4px">'+getRoleBadgesHTML(roles)+'</div>':'')
    +'<div style="display:flex;align-items:center;gap:8px;margin-top:6px">'
    +'<span class="lv-badge" style="color:'+lvColor+';border-color:'+lvColor+'50;background:'+lvColor+'20;font-size:12px;padding:3px 10px">Lv.'+lv+'</span>'
    +'<span style="font-size:11px;color:#8a7050">EXP '+s.exp+' · 다음 레벨까지 '+(nextLvExp-s.exp)+' EXP</span>'
    +'</div>'
    +'<div class="lv-bar-wrap" style="margin-top:5px;max-width:200px"><div class="lv-bar-fill" style="width:'+pct+'%;background:'+lvColor+'"></div></div>'
    +'<div class="member-stats" style="margin-top:8px">'
    +(s.avg>0?'<div class="mstat"><div class="mstat-avg" style="color:'+lvColor+'">'+s.avg.toFixed(1)+'</div><div class="mstat-label">평균 평점</div></div>':'')
    +'<div class="mstat"><div class="mstat-val">'+s.played+'</div><div class="mstat-label">플레이 기록</div></div>'
    +'<div class="mstat"><div class="mstat-val">'+s.exp+'</div><div class="mstat-label">EXP</div></div>'
    +(s.reviewCount?'<div class="mstat"><div class="mstat-val">'+s.reviewCount+'</div><div class="mstat-label">리뷰 수</div></div>':'')
    +'</div></div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">'
    +'<button class="f-act member-detail-close">닫기</button>'
    +'<button class="assign-role-btn" data-toggle-panel="'+m+'">✦ 역할 부여</button>'
    +'</div></div>'
    +'<div class="role-select-panel" id="rp_'+m+'">'
    +'<div class="role-select-title">역할 선택</div>'
    +'<div class="role-btns">'+roleBtns+'<button class="role-assign-btn none-btn" data-assign-member="'+m+'" data-assign-role="">모두 해제</button></div>'
    +'</div>'
    +(rvs.length?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a1e08"><div class="sbar-label" style="margin-bottom:8px">내가 남긴 리뷰</div><div class="member-games-list">'+rvHTML+'</div></div>':'')
    +'<div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a1e08">'
    +'<div class="sbar-label" style="margin-bottom:8px">플레이 기록 ('+playedGames.length+'게임 · 높은 평점순)</div>'
    +'<div class="member-games-list">'+csvHTML+'</div>'
    +'</div>';
  det.classList.add('open');
}

        <option value="3">3인</option>
        <option value="4">4인</option>
        <option value="5">5인</option>
        <option value="6">6인</option>
        <option value="7">7인</option>
        <option value="8">8인</option>
        <option value="9+">9인 이상</option>
      </select>
    </div>
    <button class="rec-add-btn" onclick="toggleRecForm()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      기록 추가
    </button>
  </div>
  <div id="gameList"><div class="loading">☽ 기록을 불러오는 중... ☾</div></div>
</div>

<div id="members-page">
  <div class="page-deco" style="margin-bottom:1rem">✦ ── 모험가 명부 ── ✦</div>
  <div class="members-sort-row">
    <input type="text" class="member-search-input" id="memberSearch" placeholder="🔍 회원 검색..." oninput="renderMemberGrid()">
    <button class="ms-btn active" id="msort-exp" onclick="setMemberSort('exp')">경험치순</button>
    <button class="ms-btn" id="msort-avg" onclick="setMemberSort('avg')">평점순</button>
    <button class="ms-btn" id="msort-name" onclick="setMemberSort('name')">이름순</button>
    <button class="rec-add-btn" data-toggle-member-admin style="padding:6px 12px;font-size:11px">회원 추가</button>
  </div>
  <div class="role-select-panel" id="memberAdminPanel" style="margin-bottom:1rem">
    <div class="role-select-title">관리자 전용 회원 추가</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input type="text" class="member-search-input" id="newMemberName" placeholder="추가할 회원 이름" style="flex:1;min-width:160px" onkeydown="if(event.key==='Enter')addMember()">
      <button class="rf-submit" data-add-member>추가</button>
    </div>
  </div>
  <div class="member-grid" id="memberGrid"></div>
  <div class="member-detail" id="memberDetail"></div>
</div></div>

<div class="toast" id="toast2" style="display:none"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밀실극장 파티 게시판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="guild-header">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:18px;color:var(--gold-dark)">⚔</span>
  </div>
  <div class="guild-title">
    <div class="live-rune" title="실시간 연결됨"></div>
    <span class="ornament">✦</span>
    밀실극장 파티 게시판
    <span class="ornament">✦</span>
  </div>
  <button class="post-btn" onclick="toggleForm()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    공고 게시
  </button>
</div>


<!-- ── 탭 네비게이션 ── -->
<div class="tab-nav">
  <button class="tab-btn active" id="tab-board" onclick="switchTab('board')">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="6" width="10" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="10" width="11" height="1.5" rx=".75" fill="currentColor"/></svg>
    퀘스트 게시판
  </button>
  <button class="tab-btn" id="tab-records" onclick="switchTab('records')">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    모험 기록부
  </button>
  <button class="tab-btn" id="tab-members" onclick="switchTab('members')">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11 7a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6h1M14 12a2 2 0 11-4 0 2 2 0 014 0zM12 10v4M10 12h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    회원 명부
  </button>
  <button class="tab-btn" id="tab-findgame" onclick="switchTab('findgame')">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    게임 찾기
  </button>
</div>
<button class="admin-toggle-btn" id="adminToggleBtn" onclick="toggleAdminMode()" title="관리자 모드">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.8 3.6L14 5.3l-3 2.9.7 4.1L8 10.4l-3.7 1.9.7-4.1-3-2.9 4.2-.7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
</button>

<div id="board-page" class="page">
  <div class="page-deco">✦ ── ── ── ── ── ── ── ── ── ✦</div>

  <div class="form-scroll" id="formCard">
    <div class="scroll-title" id="formTitleLabel">✦ 새 퀘스트 공고 ✦</div>
    <div class="form-grid">
      <div class="form-group"><label>날짜</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>집결 시간</label><input type="time" id="fTime"></div>
      <div class="form-group full"><label>작품명 / 퀘스트명</label><input type="text" id="fTitle" placeholder="작품명을 입력하세요"></div>
      <div class="form-group full">
        <label>모집 인원</label>
        <div class="member-row">
          <div class="member-field"><span class="gender-label">⚔ 남자</span><input type="number" id="fMale" min="0" value="0"><span style="font-size:12px;color:var(--ink-dim)">명</span></div>
          <div class="member-field"><span class="gender-label">✦ 여자</span><input type="number" id="fFemale" min="0" value="0"><span style="font-size:12px;color:var(--ink-dim)">명</span></div>
        </div>
      </div>
      <div class="form-group"><label>작성자 비밀번호</label><input type="password" id="fEventPw" maxlength="4" inputmode="numeric" placeholder="4자리 숫자"></div>
      <div class="form-group full"><label>공고 내용</label><textarea id="fNote" rows="2" placeholder="퀘스트 세부 내용을 입력하세요"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">취소</button>
      <button class="btn-post" id="submitBtn" onclick="submitEvent()">게시하기</button>
    </div>
  </div>

  <div class="filter-row">
    <span>정렬</span>
    <button class="f-btn active" id="sortAsc" onclick="setSort('asc')">날짜순</button>
    <button class="f-btn" id="sortDesc" onclick="setSort('desc')">최신순</button>
    <span style="margin-left:6px">보기</span>
    <button class="f-btn active" id="filterAll" onclick="setFilter('all')">전체</button>
    <button class="f-btn" id="filterUpcoming" onclick="setFilter('upcoming')">예정만</button>
  </div>

  <div id="eventList"><div class="loading">☽ 게시판을 불러오는 중... ☾</div></div>
</div>


<!-- 비밀번호 모달 -->
<div class="pw-modal-wrap hidden" id="pwModalWrap">
  <div class="pw-modal">
    <div class="pw-title" id="pwTitle">✦ 관리자 인증 ✦</div>
    <input type="password" class="pw-input" id="pwInput" maxlength="4" placeholder="····" oninput="pwKeyInput(this)" onkeydown="if(event.key==='Enter')confirmPw()">
    <div class="pw-error" id="pwError"></div>
    <div class="pw-btns">
      <button class="pw-cancel" onclick="closePwModal()">취소</button>
      <button class="pw-confirm" onclick="confirmPw()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  function loadApp(){
    function go(){
      var s=document.createElement('script');
      s.src='app.js';
      document.body.appendChild(s);
    }
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',go);
    }else{
      go();
    }
  }
  function fail(err){
    var list=document.getElementById('eventList');
    if(list)list.innerHTML='<div class="empty" style="color:#8b1a1a">데이터 로딩 실패: '+(err&&err.message||err)+'<br>로컬에서 여는 경우 http 서버로 실행해 주세요 (예: python3 -m http.server).</div>';
    console.error('data load failed',err);
  }
  if(!window.fetch){fail(new Error('fetch API 미지원 브라우저'));return;}
  Promise.all([
    fetch('data/games.json').then(function(r){return r.json();}),
    fetch('data/reviews.json').then(function(r){return r.json();}),
    fetch('data/memberStats.json').then(function(r){return r.json();}),
    fetch('data/membersList.json').then(function(r){return r.json();})
  ]).then(function(res){
    window._GAMES_DATA=res[0];
    window._XLSX_REVIEWS_DATA=res[1];
    window._MEMBER_STATS_DATA=res[2];
    window._MEMBERS_LIST_DATA=res[3];
    loadApp();
  }).catch(fail);
})();
</script>

<div id="records-page">
  <div class="page-deco" style="margin-bottom:1rem">✦ ── 길드 모험 기록 ── ✦</div>
  <div class="stat-row" id="statRow"></div>

  <!-- 기록 추가 폼 -->
  <div class="rec-form-card" id="recFormCard">
    <div class="scroll-title" id="recFormTitle">✦ 새 게임 기록 추가 ✦</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>게임명 * <span style="font-size:10px;color:#8a7050;font-family:sans-serif">(입력하면 기존 게임 목록에서 검색됩니다)</span></label>
        <div class="autocomplete-wrap">
          <input type="text" id="rfName" class="autocomplete-wrap" placeholder="게임명을 입력하세요" autocomplete="off" oninput="acSearch(this.value)" onkeydown="acKeydown(event)">
          <div class="autocomplete-list" id="acList"></div>
        </div>
      </div>
      <div class="form-group"><label>소유자</label><input type="text" id="rfOwner" placeholder="ex) 양석"></div>
      <div class="form-group"><label>인원수</label><input type="text" id="rfPlayers" placeholder="ex) 5인"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeRecForm()">취소</button>
      <button class="btn-post" id="recSubmitBtn" onclick="submitGame()">기록 저장</button>
    </div>
  </div>

  <div class="rec-controls-top">
    <div class="rec-controls" style="flex:1;margin-bottom:0">
      <input type="text" class="rec-search" id="recSearch" placeholder="🔍 게임명 검색..." oninput="debouncedFilterGames()">
      <select class="rec-select" id="recSort" onchange="filterGames()">
        <option value="avg-desc">평점 높은 순</option>
        <option value="avg-asc">평점 낮은 순</option>
        <option value="name">이름 순</option>
        <option value="diff-desc">난이도 높은 순</option>
        <option value="review-desc">리뷰 많은 순</option>
      </select>
      <select class="rec-select" id="recDiff" onchange="filterGames()">
        <option value="">전체 난이도</option>
        <option value="★☆☆☆☆">★☆☆☆☆</option>
        <option value="★★☆☆☆">★★☆☆☆</option>
        <option value="★★★☆☆">★★★☆☆</option>
        <option value="★★★★☆">★★★★☆</option>
        <option value="★★★★★">★★★★★</option>
      </select>
      <select class="rec-select" id="recScore" onchange="filterGames()">
        <option value="">전체 평점</option>
        <option value="9">9점 이상 명작</option>
        <option value="8">8점 이상</option>
        <option value="7">7점 이상</option>
        <option value="5-">5점 미만</option>
      </select>
      <select class="rec-select" id="recPlayers" onchange="filterGames()">
        <option value="">전체 인원</option>
        <option value="2">2인</option>
        <option value="3">3인</option>
        <option value="4">4인</option>
        <option value="5">5인</option>
        <option value="6">6인</option>
        <option value="7">7인</option>
        <option value="8">8인</option>
        <option value="9+">9인 이상</option>
      </select>
    </div>
    <button class="rec-add-btn" onclick="toggleRecForm()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      기록 추가
    </button>
  </div>
  <div id="gameList"><div class="loading">☽ 기록을 불러오는 중... ☾</div></div>
</div>

<div id="members-page">
  <div class="page-deco" style="margin-bottom:1rem">✦ ── 모험가 명부 ── ✦</div>
  <div class="members-sort-row">
    <input type="text" class="member-search-input" id="memberSearch" placeholder="🔍 회원 검색..." oninput="debouncedRenderMemberGrid()">
    <button class="ms-btn active" id="msort-exp" onclick="setMemberSort('exp')">경험치순</button>
    <button class="ms-btn" id="msort-avg" onclick="setMemberSort('avg')">평점순</button>
    <button class="ms-btn" id="msort-name" onclick="setMemberSort('name')">이름순</button>
    <button class="rec-add-btn" data-toggle-member-admin style="padding:6px 12px;font-size:11px">회원 추가</button>
  </div>
  <div class="role-select-panel" id="memberAdminPanel" style="margin-bottom:1rem">
    <div class="role-select-title">관리자 전용 회원 추가</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input type="text" class="member-search-input" id="newMemberName" placeholder="추가할 회원 이름" style="flex:1;min-width:160px" onkeydown="if(event.key==='Enter')addMember()">
      <button class="rf-submit" data-add-member>추가</button>
    </div>
  </div>
  <div class="member-grid" id="memberGrid"></div>
  <div class="member-detail" id="memberDetail"></div>
</div>

<div id="findgame-page">
  <div class="page-deco" style="margin-bottom:1rem">✦ ── 파티 매칭 ── ✦</div>
  <div class="finder-control-row">
    <label class="finder-total-label">총 인원</label>
    <div class="finder-stepper" role="group" aria-label="총 인원 조절">
      <button type="button" class="finder-step-btn" onclick="adjustFinderTotal(-1)" aria-label="감소">−</button>
      <span class="finder-step-val" id="finderTotalVal">1</span>
      <span class="finder-step-unit">명</span>
      <button type="button" class="finder-step-btn" onclick="adjustFinderTotal(1)" aria-label="증가">+</button>
    </div>
    <span class="finder-total-hint">비회원 포함 가능</span>
  </div>
  <div class="finder-dropdown-wrap" id="finderDropdownWrap">
    <input type="text" class="finder-dropdown-input" id="finderDropdownInput" placeholder="회원 추가 (이름 검색)..." oninput="handleFinderDropdownInput()" onfocus="openFinderDropdown()" autocomplete="off">
    <div class="finder-dropdown-list" id="finderDropdownList" hidden></div>
  </div>
  <div class="finder-summary-row">
    <span id="finderSummary" class="finder-summary">선택된 회원 0명</span>
    <button class="ms-btn" id="finderClearBtn" onclick="clearFinderSelection()">선택 해제</button>
  </div>
  <div class="finder-chip-list" id="finderChipList"></div>
  <div class="rec-controls-top">
    <div class="rec-controls" style="flex:1;margin-bottom:0">
      <input type="text" class="rec-search" id="finderSearch" placeholder="🔍 게임명 검색..." oninput="debouncedRenderFinderResults()">
      <select class="rec-select" id="finderSort" onchange="renderFinderResults()">
        <option value="game-asc">이름 오름순</option>
        <option value="game-desc">이름 내림순</option>
        <option value="players-asc">인원 적은 순</option>
        <option value="players-desc">인원 많은 순</option>
      </select>
    </div>
  </div>
  <div id="finderList"></div>
  <div class="finder-unknown-section" id="finderUnknownSection" hidden>
    <button class="finder-unknown-header" id="finderUnknownHeader" onclick="toggleFinderUnknown()">
      <span id="finderUnknownLabel">⚠ 인원 표기 불명 (0)</span>
      <span class="finder-unknown-chev">▸</span>
    </button>
    <div class="finder-unknown-body" id="finderUnknownBody" hidden></div>
  </div>
</div>

<div class="toast" id="toast2" style="display:none"></div>

</body>
</html>
